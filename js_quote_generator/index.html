<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Quote Generator</title>
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 16px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        blockquote {
            font-size: 1.5rem;
            font-style: italic;
            margin: 0 0 1rem 0;
            min-height: 80px;
        }
        .author {
            font-size: 1.1rem;
            font-weight: 600;
            opacity: 0.9;
            margin-bottom: 2rem;
        }
        button {
            background: #ffffff;
            color: #764ba2;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .loading {
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <blockquote id="quoteText">"Click the button below to fetch a quote!"</blockquote>
        <div class="author" id="quoteAuthor">- AI</div>
        <button id="newQuoteBtn">Get New Quote</button>
    </div>

    <script>
        const quoteText = document.getElementById('quoteText');
        const quoteAuthor = document.getElementById('quoteAuthor');
        const newQuoteBtn = document.getElementById('newQuoteBtn');

        async function fetchQuote() {
            // Set loading state
            quoteText.classList.add('loading');
            
            try {
                // Using an open API that doesn't require a key
                const response = await fetch('https://api.gameofthronesquotes.xyz/v1/random');
                if (!response.ok) throw new Error("Network response was not ok");
                
                const data = await response.json();
                
                // Update DOM elements dynamically
                quoteText.textContent = `"${data.sentence}"`;
                quoteAuthor.textContent = `- ${data.character.name}`;
                
            } catch (error) {
                quoteText.textContent = "Oops! Could not fetch a quote right now.";
                quoteAuthor.textContent = "";
                console.error("Fetch error:", error);
            } finally {
                // Remove loading state
                quoteText.classList.remove('loading');
            }
        }

        // Event listener for button click
        newQuoteBtn.addEventListener('click', fetchQuote);
    </script>
</body>
</html>
